<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="A Quiet corner for people who loves cats,coffee and Slow mornigns! ^_^">
        <title>GaGa Cafe</title>
        <link rel="icon" href="assets/imgs/favicon.svg" type="image/svg+xml">
        <link rel="stylesheet" href="style.css">
        <link rel="preload" href="assets/fonts/PressStart2P.woff2" as="font" type="font/wolf2" crossorigin="anonymous">
        <link rel="preload" href="assets/fonts/VarelaRound-Regular.woff2" as="font" type="font/wolf2" crossorigin="anonymous">
    </head>

    <body>
        <nav>
            <div class="logo-container">
                <button class="icon-btn hover-sound meow-sound">
                    <img id="gaga-logo" class="bounce-glow-on hover-sound meow-sound"
                    alt="GaGa Cafe logo"
                    src="assets/imgs/gaga-logo.svg">
                </button>

                <h2 id="cafe-name" class="color-change-text">GaGa Cafe</h2>
            </div>

            <div class="links-container">
                <ul>
                    <li class="nav-link underline-slide hover-sound click-sound"><a href="https://github.com/betmen-0" target="_blank">About</a></li>
                    <li class="nav-link underline-slide hover-sound click-sound"><a href="#menu">Menu</a></li>
                    <li class="nav-link underline-slide hover-sound click-sound"><a href="#order">Order</a></li>
                </ul>
            </div>

            <div class="icon-container">
                <button class="icon-btn state-transition hover-sound click-sound" onclick="toogleMusic()">
                    <img id="music-icon" class="bounce-glow-on" alt="Music off" src="assets/imgs/music-off-icon.svg">
                    <span class="badge" id="music-icon-badge">Music Off</span>
                </button>
            </div>
        </nav>

        <main>
            <section id="about">

                <article class="cafe-info">
                    <p id="intro-tagline"><span id="typing-text">Loading...</span><span id="cursor">\</span></p>
                    <h1 id="gato-cafe" class="floating-el">GaGa Cafe</h1>
                    <p id="cafe-des">A cute, Safe and Lovable place for cat lovers,coffee and Slow mornings. Come As you are. Stay as long as you can! (づ￣ 3￣)づ</p>

                    <div class="hero-btns">
                        <a href="#menu" class="cta-btn click-btn hover-sound click-sound" id="primary-btn">View Menu →</a>
                        <a href="#order" class="cta-btn click-btn hover-sound click-sound" id="secondary-btn">Order Now</a>
                    </div>
                </article>

                <div class="hero-illustration">
                    <img id="gato-illustration" alt="GaGa Cafe illustration" src="assets/imgs/gaga-illustration.webp" width="500">
                </div>
            </section>

            
        </main>
    </body>

</html>
